<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0A0A0A; color: #F5F0E8; font-family: 'DM Sans', sans-serif; }
    button, input { font-family: inherit; }
    .app { min-height: 100vh; }
    .header { background: linear-gradient(135deg, #111 0%, #1A1500 100%); border-bottom: 1px solid rgba(212,175,55,0.2); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; z-index: 5; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .logo { width: 30px; height: 30px; background: linear-gradient(135deg, #D4AF37, #8B6914); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }
    .brand-small { font-size: 9px; letter-spacing: .2em; color: #D4AF37; text-transform: uppercase; }
    .brand-title { font-size: 15px; font-family: 'Playfair Display', serif; font-weight: 700; }
    .nav { display: flex; gap: 2px; background: rgba(255,255,255,.04); border-radius: 10px; padding: 3px; flex-wrap: wrap; }
    .nav button { padding: 9px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 11px; font-weight: 600; background: transparent; color: #6B7280; border-bottom: 2px solid transparent; }
    .nav button.active { background: rgba(212,175,55,.15); color: #D4AF37; border-bottom-color: #D4AF37; }

    .slider-num { background: rgba(212,175,55,.08); border: 1px solid rgba(212,175,55,.3); border-radius: 6px; color: #F5F0E8; padding: 4px 8px; width: 82px; text-align: right; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; }
    input[type=range] { width: 100%; accent-color: #D4AF37; }

    .mp-btn.active { border-color: #D4AF37; background: rgba(212,175,55,.1); color: #D4AF37; }
    .hero { background: linear-gradient(135deg, #111 0%, #1A1500 100%); border-radius: 14px; padding: 22px; margin-bottom: 14px; border: 1px solid rgba(0,229,160,.25); }
    .eyebrow { font-size: 10px; color: #6B7280; letter-spacing: .15em; text-transform: uppercase; }
    .price { font-size: 42px; font-family: 'Playfair Display', serif; font-weight: 700; color: #F5F0E8; }
    .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; }
    .metric { text-align: center; }
    .metric-label { font-size: 11px; color: #6B7280; margin-bottom: 4px; }
    .metric-value { font-size: 20px; font-family: 'DM Mono', monospace; font-weight: 700; }
    .save-btn { width: 100%; margin-top: 16px; padding: 10px; border-radius: 9px; border: 1px solid rgba(212,175,55,.4); background: rgba(212,175,55,.12); color: #D4AF37; font-size: 12px; font-weight: 600; cursor: pointer; }

    .portfolio { max-width: 1100px; margin: 0 auto; padding: 28px; }
    .portfolio-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; gap: 16px; }
    .portfolio-title { font-size: 22px; font-family: 'Playfair Display', serif; font-weight: 700; }

    .sorts button.active { background: rgba(212,175,55,.15); color: #D4AF37; }

    .product-row { background: rgba(255,255,255,.03); border-radius: 12px; padding: 14px 16px; display: grid; grid-template-columns: 2fr .8fr .8fr .8fr .9fr 1fr auto; gap: 10px; align-items: center; margin-bottom: 8px; }
    .prod-name { font-size: 13px; font-weight: 600; }

    .mono { font-family: 'DM Mono', monospace; font-size: 12px; }
    .small-btn { padding: 5px 8px; border-radius: 6px; background: transparent; cursor: pointer; }
    .load { border: 1px solid rgba(212,175,55,.3); color: #D4AF37; }

      .metric-grid { grid-template-columns: 1fr; }
      .portfolio-head { flex-direction: column; }
      .product-row { grid-template-columns: 1fr 1fr; }

<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    const { useState, useEffect } = React;

    const defaultValues = {
      nomeProduto: '', custoRolo: 80, gramasPeca: 100, embalagem: 3, marketplace: 'shopee', imposto: 7,
      custoFixoMensal: 4200, unidadesMes: 150, custoAdsMensal: 0, margemDesejada: 55, precoAtual: 0,
      horasImpressao: 6, valorHoraMaquina: 4, energiaPeca: 0.8, perdaProducao: 8, comissaoFixa: 2, vendasMesProduto: 10
    };

    const marketplaceRates = {
      shopee: { nome: 'Shopee', taxa: 16, comissaoFixaPadrao: 2 },
      mercadolivre: { nome: 'Mercado Livre', taxa: 17, comissaoFixaPadrao: 6 },
      proprio: { nome: 'Loja Própria', taxa: 3, comissaoFixaPadrao: 1 }
    };

    const STORAGE_KEY = 'solidum3d_historico_v5_html';
    const fmt = (val) => Number(val || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const pct = (val) => `${Number(val || 0).toFixed(1)}%`;
    function loadHistorico() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; } catch { return []; } }
    function saveHistorico(list) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch {} }

    function precoPsicologico(valor) {
      if (!isFinite(valor) || valor <= 0) return 0;
      const bases = [29.9,34.9,39.9,44.9,49.9,54.9,59.9,64.9,69.9,74.9,79.9,84.9,89.9,99.9,109.9,119.9,129.9,149.9,169.9,199.9,249.9,299.9,349.9,399.9,499.9];
      return bases.find(p => p >= valor) || Math.ceil(valor / 10) * 10 - 0.1;
    }

    function calcularResultado(v) {
      const mp = marketplaceRates[v.marketplace] || marketplaceRates.shopee;
      const taxa = Number(mp.taxa || 0) / 100;
      const imposto = Number(v.imposto || 0) / 100;
      const margemFrac = Number(v.margemDesejada || 0) / 100;
      const unidadesMes = Math.max(Number(v.unidadesMes || 1), 1);
      const custoFixoUnit = Number(v.custoFixoMensal || 0) / unidadesMes;
      const custoAdsUnit = Number(v.custoAdsMensal || 0) / unidadesMes;
      const custoFilamentoBruto = (Number(v.custoRolo || 0) / 1000) * Number(v.gramasPeca || 0);
      const perda = Number(v.perdaProducao || 0) / 100;
      const custoFilamento = custoFilamentoBruto * (1 + perda);
      const embalagem = Number(v.embalagem || 0);
      const energiaPeca = Number(v.energiaPeca || 0);
      const horasImpressao = Number(v.horasImpressao || 0);
      const valorHoraMaquina = Number(v.valorHoraMaquina || 0);
      const custoTempoMaquina = horasImpressao * valorHoraMaquina;
      const comissaoFixa = Number(v.comissaoFixa || 0) || Number(mp.comissaoFixaPadrao || 0);
      const custoVariavel = custoFilamento + embalagem + energiaPeca + custoTempoMaquina + comissaoFixa;
      const custoTotal = custoVariavel + custoFixoUnit + custoAdsUnit;
      const denominadorMinimo = 1 - taxa - imposto;
      const denominadorIdeal = 1 - taxa - imposto - margemFrac;
      const precoMinimo = denominadorMinimo > 0 ? custoTotal / denominadorMinimo : null;
      const precoSugerido = denominadorIdeal > 0 ? custoTotal / denominadorIdeal : null;
      if (!precoSugerido || !isFinite(precoSugerido)) return { erro: 'Combinação inviável: reduza margem, taxa ou custos.', custoTotal, precoMinimo };
      const precoPsico = precoPsicologico(precoSugerido);
      const taxaValor = precoSugerido * taxa;
      const impostoValor = precoSugerido * imposto;
      const lucroLiquido = precoSugerido - custoTotal - taxaValor - impostoValor;
      const margemReal = (lucroLiquido / precoSugerido) * 100;
      const lucroHora = horasImpressao > 0 ? lucroLiquido / horasImpressao : 0;
      const capacidadeMensalPorMaquina = horasImpressao > 0 ? Math.floor((24 * 26) / horasImpressao) : 0;
      const capacidadeMensal5Maquinas = capacidadeMensalPorMaquina * 5;
      const lucroMensalEstimado = lucroLiquido * Number(v.vendasMesProduto || 0);

      let viabilidade = 'Revisar', viabilidadeCor = '#FACC15', viabilidadeMsg = 'Produto exige atenção antes de escalar.';
      if (margemReal >= 40 && lucroLiquido >= 15 && lucroHora >= 3) { viabilidade = 'Vale escalar'; viabilidadeCor = '#00E5A0'; viabilidadeMsg = 'Produto forte para ocupar máquina e receber tráfego.'; }
      else if (margemReal >= 30 && lucroLiquido >= 10 && lucroHora >= 2) { viabilidade = 'Vale manter'; viabilidadeCor = '#4ADE80'; viabilidadeMsg = 'Produto saudável, mas ainda não é prioridade máxima.'; }
      else if (margemReal >= 20) { viabilidade = 'Teste controlado'; viabilidadeCor = '#FACC15'; viabilidadeMsg = 'Pode vender, mas não deve ocupar muita capacidade.'; }
      else { viabilidade = 'Não priorizar'; viabilidadeCor = '#F87171'; viabilidadeMsg = 'Margem baixa para a operação da Solidum3D.'; }

      let classificacao = 'Crítico', cor = '#F87171', emoji = '🚨';
      if (margemReal >= 50 && lucroHora >= 3) { classificacao = 'Campeão'; cor = '#00E5A0'; emoji = '🏆'; }
      else if (margemReal >= 35) { classificacao = 'Saudável'; cor = '#4ADE80'; emoji = '✅'; }
      else if (margemReal >= 20) { classificacao = 'Experimento'; cor = '#FACC15'; emoji = '⚠️'; }

      let diagnosticoAtual = null;
      const pa = Number(v.precoAtual || 0);
      if (pa > 0) {
        const lucroAtual = pa - custoTotal - pa * taxa - pa * imposto;
        const margemAtual = (lucroAtual / pa) * 100;
        const lucroHoraAtual = horasImpressao > 0 ? lucroAtual / horasImpressao : 0;
        const diff = pa - precoSugerido;
        let status = 'Saudável', statusCor = '#00E5A0', statusMsg = `Produto saudável: R$ ${fmt(lucroHoraAtual)} por hora de máquina.`;
        if (precoMinimo && pa < precoMinimo) { status = 'Prejuízo'; statusCor = '#F87171'; statusMsg = `Você perde R$ ${fmt(Math.abs(lucroAtual))} por peça.`; }
        else if (lucroHoraAtual < 2) { status = 'Baixo rendimento'; statusCor = '#FACC15'; statusMsg = `Lucro/hora de apenas R$ ${fmt(lucroHoraAtual)}.`; }
        else if (margemAtual < 35) { status = 'Abaixo do ideal'; statusCor = '#FACC15'; statusMsg = `Margem real de ${pct(margemAtual)}.`; }
        diagnosticoAtual = { lucroAtual, margemAtual, lucroHoraAtual, diff, status, statusCor, statusMsg, pa };
      }
      return { precoMinimo, precoSugerido, precoPsico, custoTotal, custoFixoUnit, custoAdsUnit, custoVariavel, custoFilamento, custoFilamentoBruto, embalagem, energiaPeca, custoTempoMaquina, comissaoFixa, taxaValor, impostoValor, lucroLiquido, margemReal, lucroHora, capacidadeMensalPorMaquina, capacidadeMensal5Maquinas, lucroMensalEstimado, classificacao, cor, emoji, viabilidade, viabilidadeCor, viabilidadeMsg, diagnosticoAtual };
    }

    function App() {
      const [v, setV] = useState(defaultValues);
      const [resultado, setResultado] = useState(null);
      const [tab, setTab] = useState('custos');
      const [viewTab, setViewTab] = useState('calc');
      const [historico, setHistorico] = useState([]);
      const [savedMsg, setSavedMsg] = useState(false);
      const [sortBy, setSortBy] = useState('lucroHora');

      useEffect(() => { setHistorico(loadHistorico()); }, []);
      useEffect(() => { setResultado(calcularResultado(v)); }, [v]);
      const set = (key, val) => setV(prev => ({ ...prev, [key]: val }));

      function salvarProduto() {
        if (!resultado || resultado.erro) return;
        const entrada = { id: Date.now(), data: new Date().toLocaleDateString('pt-BR'), nome: v.nomeProduto || 'Produto sem nome', marketplace: marketplaceRates[v.marketplace]?.nome || 'Shopee', precoSugerido: resultado.precoSugerido, precoPsico: resultado.precoPsico, precoMinimo: resultado.precoMinimo, precoAtual: Number(v.precoAtual || 0), lucroLiquido: resultado.lucroLiquido, lucroHora: resultado.lucroHora, margemReal: resultado.margemReal, margemAtual: resultado.diagnosticoAtual?.margemAtual || null, lucroAtual: resultado.diagnosticoAtual?.lucroAtual || null, viabilidade: resultado.viabilidade, viabilidadeCor: resultado.viabilidadeCor, classificacao: resultado.classificacao, cor: resultado.cor, emoji: resultado.emoji, custoTotal: resultado.custoTotal, capacidadeMensalPorMaquina: resultado.capacidadeMensalPorMaquina, capacidadeMensal5Maquinas: resultado.capacidadeMensal5Maquinas, lucroMensalEstimado: resultado.lucroMensalEstimado, inputs: { ...v } };
        const novo = [entrada, ...historico.filter(h => h.nome !== entrada.nome || h.inputs?.marketplace !== entrada.inputs.marketplace)];
        setHistorico(novo); saveHistorico(novo); setSavedMsg(true); setTimeout(() => setSavedMsg(false), 2000);
      }
      function excluirProduto(id) { const novo = historico.filter(h => h.id !== id); setHistorico(novo); saveHistorico(novo); }
      function recarregarProduto(entrada) { setV(entrada.inputs); setViewTab('calc'); setTab('custos'); }
      function exportarCSV() {
        if (!historico.length) return;
        const header = ['Data','Produto','Marketplace','Preço Atual','Margem Atual %','Preço Sugerido','Preço Psicológico','Preço Mínimo','Lucro/Peça','Lucro/Hora','Margem Ideal %','Viabilidade','Capacidade 1 Máquina','Capacidade 5 Máquinas','Lucro Mensal Estimado','Classificação'];
        const rows = historico.map(h => [h.data,h.nome,h.marketplace,h.precoAtual > 0 ? h.precoAtual.toFixed(2) : '-',h.margemAtual != null ? h.margemAtual.toFixed(1) : '-',h.precoSugerido.toFixed(2),h.precoPsico?.toFixed(2) || '-',h.precoMinimo?.toFixed(2) || '-',h.lucroLiquido.toFixed(2),h.lucroHora?.toFixed(2) || '-',h.margemReal.toFixed(1),h.viabilidade || '-',h.capacidadeMensalPorMaquina || '-',h.capacidadeMensal5Maquinas || '-',h.lucroMensalEstimado?.toFixed(2) || '-',h.classificacao]);
        const csv = [header, ...rows].map(r => r.join(';')).join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'solidum3d_precificadora_v5.csv'; a.click(); URL.revokeObjectURL(url);
      }
      const sorted = [...historico].sort((a,b) => sortBy === 'margem' ? b.margemReal - a.margemReal : sortBy === 'lucro' ? b.lucroLiquido - a.lucroLiquido : sortBy === 'lucroHora' ? (b.lucroHora || 0) - (a.lucroHora || 0) : sortBy === 'preco' ? b.precoSugerido - a.precoSugerido : sortBy === 'nome' ? a.nome.localeCompare(b.nome) : 0);

      const InputSlider = ({ label, keyName, min, max, step = 1, prefix = '', suffix = '', hint = '' }) => React.createElement('div', { className: 'slider-block' },
        React.createElement('div', { className: 'slider-head' },
          React.createElement('span', { className: 'label', style: { marginBottom: 0 } }, label),
          React.createElement('div', { className: 'input-wrap' },
            React.createElement('span', { className: 'prefix' }, prefix),
            React.createElement('input', { className: 'slider-num', type: 'number', value: v[keyName], min, max, step, onChange: e => set(keyName, parseFloat(e.target.value) || 0) }),
            React.createElement('span', { className: 'suffix' }, suffix)
          )
        ),
        React.createElement('input', { type: 'range', min, max, step, value: v[keyName], onChange: e => set(keyName, parseFloat(e.target.value)) }),
        hint ? React.createElement('div', { className: 'hint' }, hint) : null
      );
      const CardNum = ({ label, value, cor = '#F5F0E8' }) => React.createElement('div', { className: 'metric' }, React.createElement('div', { className: 'metric-label' }, label), React.createElement('div', { className: 'metric-value', style: { color: cor } }, value));
      const MpSelect = () => React.createElement('div', null, Object.entries(marketplaceRates).map(([key, mp]) => React.createElement('button', { key, className: `mp-btn ${key === v.marketplace ? 'active' : ''}`, onClick: () => { set('marketplace', key); set('comissaoFixa', mp.comissaoFixaPadrao); } }, React.createElement('span', null, mp.nome), React.createElement('span', null, `−${mp.taxa}% + R$ ${fmt(mp.comissaoFixaPadrao)}`))));
      const NavBtn = ({ id, label, count = 0 }) => React.createElement('button', { className: viewTab === id ? 'active' : '', onClick: () => setViewTab(id) }, label, count > 0 ? React.createElement('span', { className: 'badge' }, count) : null);

      function renderTab() {
        if (tab === 'custos') return React.createElement(React.Fragment, null,
          React.createElement(InputSlider, { label: 'Custo do rolo', keyName: 'custoRolo', min: 20, max: 300, step: 1, prefix: 'R$', hint: 'Valor do rolo de 1kg' }),
          React.createElement(InputSlider, { label: 'Consumo por peça', keyName: 'gramasPeca', min: 1, max: 1000, step: 1, suffix: 'g' }),
          React.createElement(InputSlider, { label: 'Embalagem e insumos', keyName: 'embalagem', min: 0, max: 30, step: 0.5, prefix: 'R$' }),
          React.createElement(InputSlider, { label: 'Margem desejada', keyName: 'margemDesejada', min: 10, max: 80, step: 1, suffix: '%' }),
          React.createElement(InputSlider, { label: 'Preço atual praticado', keyName: 'precoAtual', min: 0, max: 500, step: 0.5, prefix: 'R$' })
        );
        if (tab === 'producao') return React.createElement(React.Fragment, null,
          React.createElement(InputSlider, { label: 'Tempo de impressão', keyName: 'horasImpressao', min: 0.5, max: 24, step: 0.5, suffix: 'h', hint: 'Tempo médio que a peça ocupa uma impressora' }),
          React.createElement(InputSlider, { label: 'Valor da hora de máquina', keyName: 'valorHoraMaquina', min: 0, max: 20, step: 0.5, prefix: 'R$', hint: 'Custo estratégico por hora de impressora ocupada' }),
