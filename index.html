<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Precificadora Solidum3D v7.3</title>
<meta name="theme-color" content="#0A0A0A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Precificadora" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
:root{--bg:#0A0A0A;--panel:#121212;--panel2:#17140a;--gold:#D4AF37;--gold2:#8B6914;--txt:#F5F0E8;--muted:#7b8190;--green:#00E5A0;--green2:#4ADE80;--yellow:#FACC15;--red:#F87171;--line:rgba(255,255,255,.09)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}button,input{font-family:inherit}.app{min-height:100vh}.header{background:linear-gradient(135deg,#111 0%,#1a1500 100%);border-bottom:1px solid rgba(212,175,55,.28);padding:18px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:10}.brand{display:flex;align-items:center;gap:12px}.logo{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--gold2));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)}.brand-small{font-size:9px;letter-spacing:.24em;color:var(--gold);text-transform:uppercase}.brand-title{font-size:20px;font-weight:800}.nav{display:flex;gap:4px;background:rgba(255,255,255,.05);border-radius:12px;padding:4px}.nav button{padding:10px 18px;border:0;border-radius:9px;background:transparent;color:var(--muted);font-size:14px;font-weight:700;cursor:pointer}.nav button.active{background:rgba(212,175,55,.2);color:var(--gold)}.version{text-align:right;font-size:11px;color:var(--muted)}.version b{color:var(--gold)}.main{max-width:1180px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:26px}.label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#9CA3AF;margin:0 0 9px}.text-input{width:100%;padding:15px 16px;border-radius:12px;border:1px solid rgba(212,175,55,.35);background:rgba(212,175,55,.07);color:var(--txt);font-size:18px;outline:none}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:20px 0;background:rgba(255,255,255,.05);border-radius:12px;padding:4px}.tabs button{padding:12px 8px;border:0;border-radius:9px;background:transparent;color:var(--muted);font-weight:800;cursor:pointer}.tabs button.active{background:rgba(212,175,55,.18);color:var(--gold)}.panel,.card{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:16px;padding:20px}.slider{margin-bottom:20px}.slider-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.input-wrap{display:flex;align-items:center;gap:7px}.prefix,.suffix{color:var(--gold);font-weight:800}.num{width:94px;text-align:right;background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.34);border-radius:10px;color:var(--txt);padding:9px 10px;font-size:18px;outline:none}input[type=range]{width:100%;accent-color:var(--gold)}.hint{font-size:12px;color:var(--muted);margin-top:6px}.mp-btn{width:100%;display:flex;justify-content:space-between;padding:12px 14px;margin-bottom:8px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:#9CA3AF;font-weight:700;cursor:pointer}.mp-btn.active{border-color:var(--gold);background:rgba(212,175,55,.13);color:var(--gold)}.hero{background:linear-gradient(135deg,#111 0%,#1a1500 100%);border:1px solid rgba(0,229,160,.35);border-radius:18px;padding:26px;margin-bottom:18px}.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8d93a0}.price{font-size:54px;line-height:1;font-weight:900;margin:12px 0 20px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.metric{text-align:center}.metric-label{font-size:13px;color:var(--muted);margin-bottom:8px}.metric-value{font-size:24px;font-weight:900;color:var(--txt)}.save{width:100%;margin-top:20px;border:1px solid rgba(212,175,55,.5);background:rgba(212,175,55,.14);color:var(--gold);border-radius:12px;padding:14px;font-weight:900;font-size:15px;cursor:pointer}.save.saved{background:rgba(0,229,160,.15);border-color:rgba(0,229,160,.45);color:var(--green)}.decision{border-radius:16px;padding:18px;margin-bottom:18px}.decision-title{font-size:24px;font-weight:900;margin-top:6px}.row{display:flex;justify-content:space-between;gap:14px;font-size:14px;margin:11px 0}.row span:first-child{color:#A1A7B3}.row span:last-child{text-align:right;font-weight:800}.break{background:rgba(212,175,55,.07);border:1px solid rgba(212,175,55,.2);border-radius:14px;padding:14px;margin-bottom:14px}.portfolio{max-width:1180px;margin:0 auto;padding:24px}.portfolio-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:20px}.portfolio-title{font-size:28px;font-weight:900}.sorts{display:flex;gap:8px;flex-wrap:wrap}.sorts button{padding:9px 12px;border:0;border-radius:9px;background:rgba(255,255,255,.06);color:var(--muted);font-weight:800}.sorts button.active,.csv{background:rgba(212,175,55,.16)!important;color:var(--gold)!important;border:1px solid rgba(212,175,55,.35)!important}.prod{display:grid;grid-template-columns:2fr .9fr .9fr .9fr 1fr auto;gap:10px;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:9px}.prod-name{font-weight:900}.prod-sub{color:var(--muted);font-size:12px;margin-top:3px}.mono{font-weight:900}.small{padding:7px 9px;border-radius:8px;background:transparent;cursor:pointer}.load{border:1px solid rgba(212,175,55,.35);color:var(--gold)}.del{border:1px solid rgba(248,113,113,.35);color:var(--red)}.footer{text-align:center;border-top:1px solid var(--line);padding:16px;color:#434957;font-size:11px;letter-spacing:.14em;margin-top:20px}.hidden{display:none!important}@media(max-width:900px){.header{position:static;flex-direction:column;align-items:stretch}.version{text-align:left}.main{grid-template-columns:1fr;padding:14px}.metrics{grid-template-columns:1fr}.prod{grid-template-columns:1fr 1fr}.price{font-size:46px}.tabs{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
const defaultValues={nomeProduto:'',custoRolo:80,gramasPeca:100,embalagem:3,marketplace:'shopee',imposto:7,margemDesejada:55,precoAtual:0,horasImpressao:4,valorHoraMaquina:4,tarifaEnergia:1.01,consumoWatts:120,perdaProducao:5,comissaoFixa:2,vendasMesProduto:100,custosFixos:4200,adsGerais:0,metaFaturamento:25000,metaLucro:6000};
const marketplaceRates={shopee:{nome:'Shopee',taxa:16,comissaoFixaPadrao:2},mercadolivre:{nome:'Mercado Livre',taxa:17,comissaoFixaPadrao:6},proprio:{nome:'Loja Própria',taxa:3,comissaoFixaPadrao:1}};
const STORAGE_KEY='solidum3d_historico_v71';
let v={...defaultValues}, resultado=null, historico=[], tab='custos', view='calc', sortBy='lucroHora', saved=false;
const $=id=>document.getElementById(id);const fmt=n=>Number(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});const pct=n=>`${Number(n||0).toFixed(1)}%`;
function load(){try{historico=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{historico=[]}}function persist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(historico))}catch{}}
function precoPsicologico(valor){const bases=[29.9,34.9,39.9,44.9,49.9,54.9,59.9,64.9,69.9,74.9,79.9,84.9,89.9,99.9,109.9,119.9,129.9,149.9,169.9,199.9,249.9,299.9,349.9,399.9,499.9];return bases.find(p=>p>=valor)||Math.ceil(valor/10)*10-.1}
function calcular(v){const mp=marketplaceRates[v.marketplace]||marketplaceRates.shopee;const taxa=mp.taxa/100,imposto=Number(v.imposto||0)/100,margemFrac=Number(v.margemDesejada||0)/100;const bruto=(Number(v.custoRolo||0)/1000)*Number(v.gramasPeca||0);const filamento=bruto*(1+Number(v.perdaProducao||0)/100);const embalagem=Number(v.embalagem||0),horas=Number(v.horasImpressao||0),hora=Number(v.valorHoraMaquina||0),tarifa=Number(v.tarifaEnergia||0),watts=Number(v.consumoWatts||0);const custoTempo=horas*hora;const energiaHora=(watts/1000)*tarifa;const energia=energiaHora*horas;const comissao=Number(v.comissaoFixa||0)||mp.comissaoFixaPadrao;const custoProduto=filamento+embalagem+energia+comissao;const denomMin=1-taxa-imposto,denomIdeal=1-taxa-imposto-margemFrac;const precoMinimo=denomMin>0?custoProduto/denomMin:null;const precoSugerido=denomIdeal>0?custoProduto/denomIdeal:null;if(!precoSugerido||!isFinite(precoSugerido))return{erro:'Combinação inviável: reduza margem, taxa ou custos.',custoProduto,precoMinimo};const taxaValor=precoSugerido*taxa,impostoValor=precoSugerido*imposto;const lucroLiquido=precoSugerido-custoProduto-taxaValor-impostoValor;const margemReal=lucroLiquido/precoSugerido*100;const lucroHora=horas>0?lucroLiquido/horas:0;const cap1=horas>0?Math.floor(24*26/horas):0,cap5=cap1*5;const lucroMensal=lucroLiquido*Number(v.vendasMesProduto||0);let viabilidade='Revisar',viabilidadeCor='#FACC15',viabilidadeMsg='Produto exige atenção antes de escalar.';if(margemReal>=40&&lucroLiquido>=15&&lucroHora>=3){viabilidade='Vale escalar';viabilidadeCor='#00E5A0';viabilidadeMsg='Produto forte para ocupar máquina e receber tráfego.'}else if(margemReal>=30&&lucroLiquido>=10&&lucroHora>=2){viabilidade='Vale manter';viabilidadeCor='#4ADE80';viabilidadeMsg='Produto saudável, mas ainda não é prioridade máxima.'}else if(margemReal>=20){viabilidade='Teste controlado';viabilidadeCor='#FACC15';viabilidadeMsg='Pode vender, mas não deve ocupar muita capacidade.'}else{viabilidade='Não priorizar';viabilidadeCor='#F87171';viabilidadeMsg='Margem baixa para a operação da Solidum3D.'}let cor='#F87171',classificacao='Crítico',emoji='🚨';if(margemReal>=50&&lucroHora>=3){cor='#00E5A0';classificacao='Campeão';emoji='🏆'}else if(margemReal>=35){cor='#4ADE80';classificacao='Saudável';emoji='✅'}else if(margemReal>=20){cor='#FACC15';classificacao='Experimento';emoji='⚠️'}let diagnosticoAtual=null,pa=Number(v.precoAtual||0);if(pa>0){const lucroAtual=pa-custoProduto-pa*taxa-pa*imposto;const margemAtual=lucroAtual/pa*100;const lucroHoraAtual=horas>0?lucroAtual/horas:0;let status='Saudável',statusCor='#00E5A0',statusMsg=`Produto saudável: R$ ${fmt(lucroHoraAtual)} por hora de máquina.`;if(precoMinimo&&pa<precoMinimo){status='Prejuízo';statusCor='#F87171';statusMsg=`Você perde R$ ${fmt(Math.abs(lucroAtual))} por peça.`}else if(lucroHoraAtual<2){status='Baixo rendimento';statusCor='#FACC15';statusMsg=`Lucro/hora de apenas R$ ${fmt(lucroHoraAtual)}.`}else if(margemAtual<35){status='Abaixo do ideal';statusCor='#FACC15';statusMsg=`Margem real de ${pct(margemAtual)}.`}diagnosticoAtual={lucroAtual,margemAtual,lucroHoraAtual,status,statusCor,statusMsg,pa}}
return{precoMinimo,precoSugerido,precoPsico:precoPsicologico(precoSugerido),custoProduto,custoFilamento:filamento,custoFilamentoBruto:bruto,embalagem,energiaPeca:energia,energiaHora,tarifaEnergia:tarifa,consumoWatts:watts,custoTempoMaquina:custoTempo,comissaoFixa:comissao,taxaValor,impostoValor,lucroLiquido,margemReal,lucroHora,capacidadeMensalPorMaquina:cap1,capacidadeMensal5Maquinas:cap5,lucroMensalEstimado:lucroMensal,viabilidade,viabilidadeCor,viabilidadeMsg,cor,classificacao,emoji,diagnosticoAtual}}
function setVal(k,val){v[k]=val;render()}
function setNomeProduto(val){v.nomeProduto=val}
function escAttr(val){return String(val??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}function slider(label,k,min,max,step=1,prefix='',suffix='',hint=''){return `<div class="slider"><div class="slider-head"><div class="label">${label}</div><div class="input-wrap"><span class="prefix">${prefix}</span><input class="num" type="number" min="${min}" max="${max}" step="${step}" value="${v[k]}" onchange="setVal('${k}', parseFloat(this.value)||0)"><span class="suffix">${suffix}</span></div></div><input type="range" min="${min}" max="${max}" step="${step}" value="${v[k]}" oninput="setVal('${k}', parseFloat(this.value))">${hint?`<div class="hint">${hint}</div>`:''}</div>`}
function renderTab(){if(tab==='custos')return slider('Custo do rolo','custoRolo',20,300,1,'R$','','Valor do rolo de 1kg')+slider('Consumo por peça','gramasPeca',1,1000,1,'','g')+slider('Embalagem e insumos','embalagem',0,30,.5,'R$')+slider('Margem desejada','margemDesejada',10,80,1,'','%')+slider('Preço atual praticado','precoAtual',0,500,.5,'R$');if(tab==='producao')return slider('Tempo de impressão','horasImpressao',.5,24,.5,'','h','Tempo médio que a peça ocupa uma impressora')+slider('Meta mínima de lucro/hora','valorHoraMaquina',0,20,.5,'R$','','Indicador operacional: não entra no preço do produto')+slider('Tarifa de energia','tarifaEnergia',0,3,.01,'R$','','Valor do kWh. Pela conta enviada: cerca de R$ 1,01/kWh')+slider('Consumo médio da impressora','consumoWatts',50,350,5,'','W','Estimativa média da impressora durante a peça')+slider('Perda / refugo','perdaProducao',0,30,1,'','%','Falhas, suporte, testes, retrabalho e perdas')+slider('Vendas mensais do produto','vendasMesProduto',0,500,1,'','un');if(tab==='estrutura')return slider('Custos fixos totais da operação','custosFixos',0,30000,100,'R$','','Aluguel, contador, internet, softwares e estrutura')+slider('Ads gerais/mês','adsGerais',0,15000,50,'R$','','Investimento mensal em anúncios da operação')+slider('Meta de faturamento mensal','metaFaturamento',0,100000,500,'R$')+slider('Meta de lucro operacional','metaLucro',0,50000,500,'R$');return `<div class="label">Marketplace</div>${Object.entries(marketplaceRates).map(([key,mp])=>`<button class="mp-btn ${v.marketplace===key?'active':''}" onclick="setVal('marketplace','${key}');setVal('comissaoFixa',${mp.comissaoFixaPadrao})"><span>${mp.nome}</span><span>−${mp.taxa}% + R$ ${fmt(mp.comissaoFixaPadrao)}</span></button>`).join('')}${slider('Comissão fixa por venda','comissaoFixa',0,30,.5,'R$','','Tarifa fixa, cupom, frete subsidiado ou custo adicional')}`}
function cardNum(label,value,color){return `<div class="metric"><div class="metric-label">${label}</div><div class="metric-value" style="color:${color||'var(--txt)'}">${value}</div></div>`}
function renderCalc(){resultado=calcular(v);let estrutura='';if(resultado&&!resultado.erro){const lucroBrutoProduto=resultado.lucroMensalEstimado;const saldoAposFixos=lucroBrutoProduto-Number(v.custosFixos||0)-Number(v.adsGerais||0);const unidadeEquilibrio=resultado.lucroLiquido>0?Math.ceil((Number(v.custosFixos||0)+Number(v.adsGerais||0))/resultado.lucroLiquido):0;const unidadeMeta=resultado.lucroLiquido>0?Math.ceil((Number(v.custosFixos||0)+Number(v.adsGerais||0)+Number(v.metaLucro||0))/resultado.lucroLiquido):0;estrutura=`<div class="card"><div class="eyebrow" style="margin-bottom:12px">Estrutura da operação</div><div class="row"><span>Lucro bruto estimado do produto</span><span style="color:var(--green)">R$ ${fmt(lucroBrutoProduto)}</span></div><div class="row"><span>Custos fixos + Ads gerais</span><span>R$ ${fmt(Number(v.custosFixos||0)+Number(v.adsGerais||0))}</span></div><div class="row"><span>Saldo se só esse produto pagasse a estrutura</span><span style="color:${saldoAposFixos>=0?'var(--green)':'var(--red)'}">R$ ${fmt(saldoAposFixos)}</span></div><div class="break"><div class="row"><span>Unidades para ponto de equilíbrio</span><span>${unidadeEquilibrio} peças/mês</span></div><div class="row"><span>Unidades para meta de lucro</span><span>${unidadeMeta} peças/mês</span></div></div><div class="hint">Observação: custo fixo não entra no preço do produto. Ele aparece aqui para gestão da operação.</div></div>`}
return `<div class="main"><div><div class="label">Nome do Produto</div><input class="text-input" value="${escAttr(v.nomeProduto)}" placeholder="Ex: SolidCristo, SolidPray..." oninput="setNomeProduto(this.value)" onchange="setNomeProduto(this.value)" autocomplete="off"><div class="tabs">${[['custos','Custos'],['producao','Produção'],['estrutura','Estrutura'],['canal','Canal']].map(([k,l])=>`<button class="${tab===k?'active':''}" onclick="tab='${k}';render()">${l}</button>`).join('')}</div><div class="panel">${renderTab()}</div></div><div>${resultado.erro?`<div class="card" style="color:var(--red)">${resultado.erro}</div>`:`${resultado.diagnosticoAtual?`<div class="decision" style="background:${resultado.diagnosticoAtual.statusCor}10;border:1px solid ${resultado.diagnosticoAtual.statusCor}40"><div class="eyebrow" style="color:${resultado.diagnosticoAtual.statusCor}">Diagnóstico do preço atual</div><div class="metrics">${cardNum('Margem atual',pct(resultado.diagnosticoAtual.margemAtual),resultado.diagnosticoAtual.statusCor)}${cardNum('Lucro atual','R$ '+fmt(resultado.diagnosticoAtual.lucroAtual),resultado.diagnosticoAtual.statusCor)}${cardNum('Lucro/hora atual','R$ '+fmt(resultado.diagnosticoAtual.lucroHoraAtual),resultado.diagnosticoAtual.statusCor)}</div><div class="hint">${resultado.diagnosticoAtual.statusMsg}</div></div>`:''}<div class="hero" style="border-color:${resultado.cor}55"><div class="eyebrow">Preço sugerido</div><div class="price">R$ ${fmt(resultado.precoSugerido)}</div><div class="metrics">${cardNum('Preço psicológico','R$ '+fmt(resultado.precoPsico),'var(--gold)')}${cardNum('Lucro/peça','R$ '+fmt(resultado.lucroLiquido),resultado.cor)}${cardNum('Margem',pct(resultado.margemReal),resultado.cor)}</div><button class="save ${saved?'saved':''}" onclick="salvar()">${saved?'✓ Salvo no portfólio!':'+ Salvar no Portfólio'}</button></div><div class="decision" style="background:${resultado.viabilidadeCor}10;border:1px solid ${resultado.viabilidadeCor}40"><div class="eyebrow" style="color:${resultado.viabilidadeCor}">Decisão estratégica</div><div class="decision-title" style="color:${resultado.viabilidadeCor}">${resultado.viabilidade}</div><div class="hint">${resultado.viabilidadeMsg}</div></div><div class="metrics" style="margin-bottom:18px">${cardNum('Lucro / hora','R$ '+fmt(resultado.lucroHora),resultado.viabilidadeCor)}${cardNum('Lucro mensal','R$ '+fmt(resultado.lucroMensalEstimado),'var(--green)')}${cardNum('Preço mínimo','R$ '+fmt(resultado.precoMinimo),'var(--red)')}</div><div class="card" style="margin-bottom:18px"><div class="eyebrow" style="margin-bottom:12px">Capacidade produtiva</div><div class="row"><span>Capacidade mensal por máquina</span><span>${resultado.capacidadeMensalPorMaquina} peças</span></div><div class="row"><span>Capacidade mensal com 5 máquinas</span><span style="color:var(--gold)">${resultado.capacidadeMensal5Maquinas} peças</span></div></div><div class="card" style="margin-bottom:18px"><div class="eyebrow" style="margin-bottom:12px">Decomposição do preço do produto</div>${[['Filamento com refugo',resultado.custoFilamento],['Embalagem',resultado.embalagem],['Energia total da peça',resultado.energiaPeca],['Comissão fixa',resultado.comissaoFixa],['Taxa marketplace',resultado.taxaValor],['Imposto',resultado.impostoValor],['Lucro líquido',resultado.lucroLiquido]].map(([l,val])=>`<div class="row"><span>${l}</span><span>R$ ${fmt(val)}</span></div>`).join('')}</div><div class="card" style="margin-bottom:18px"><div class="eyebrow" style="margin-bottom:12px">Indicadores operacionais</div><div class="row"><span>Tempo de impressão</span><span>${fmt(v.horasImpressao)} h</span></div><div class="row"><span>Custo de energia/hora</span><span>R$ ${fmt(resultado.energiaHora)}</span></div><div class="row"><span>Consumo médio informado</span><span>${fmt(v.consumoWatts)} W</span></div><div class="row"><span>Tarifa de energia</span><span>R$ ${fmt(v.tarifaEnergia)}/kWh</span></div><div class="row"><span>Meta mínima de lucro/hora</span><span>R$ ${fmt(v.valorHoraMaquina)}</span></div><div class="row"><span>Lucro/hora real</span><span style="color:${resultado.lucroHora>=v.valorHoraMaquina?'var(--green)':'var(--red)'}">R$ ${fmt(resultado.lucroHora)}</span></div><div class="row"><span>Oportunidade operacional estimada</span><span>R$ ${fmt(resultado.custoTempoMaquina)}</span></div><div class="hint">A hora de máquina agora é apenas indicador de prioridade; não entra no preço sugerido.</div></div>${estrutura}`}</div></div>`}
function salvar(){if(!resultado||resultado.erro)return;const e={id:Date.now(),data:new Date().toLocaleDateString('pt-BR'),nome:v.nomeProduto||'Produto sem nome',marketplace:marketplaceRates[v.marketplace].nome,precoSugerido:resultado.precoSugerido,precoPsico:resultado.precoPsico,precoMinimo:resultado.precoMinimo,lucroLiquido:resultado.lucroLiquido,lucroHora:resultado.lucroHora,margemReal:resultado.margemReal,viabilidade:resultado.viabilidade,viabilidadeCor:resultado.viabilidadeCor,cor:resultado.cor,classificacao:resultado.classificacao,lucroMensalEstimado:resultado.lucroMensalEstimado,inputs:{...v}};historico=[e,...historico.filter(h=>h.nome!==e.nome||h.inputs?.marketplace!==e.inputs.marketplace)];persist();saved=true;render();setTimeout(()=>{saved=false;render()},1800)}
function exportCSV(){const header=['Data','Produto','Marketplace','Preço sugerido','Preço psicológico','Preço mínimo','Lucro/peça','Lucro/hora','Margem','Lucro mensal','Viabilidade'];const rows=historico.map(h=>[h.data,h.nome,h.marketplace,h.precoSugerido.toFixed(2),h.precoPsico.toFixed(2),h.precoMinimo.toFixed(2),h.lucroLiquido.toFixed(2),h.lucroHora.toFixed(2),h.margemReal.toFixed(1),h.lucroMensalEstimado.toFixed(2),h.viabilidade]);const csv=[header,...rows].map(r=>r.join(';')).join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='solidum3d_precificadora_v71.csv';a.click();URL.revokeObjectURL(url)}
function renderPortfolio(){const sorted=[...historico].sort((a,b)=>sortBy==='margem'?b.margemReal-a.margemReal:sortBy==='lucro'?b.lucroLiquido-a.lucroLiquido:sortBy==='lucroHora'?b.lucroHora-a.lucroHora:sortBy==='preco'?b.precoSugerido-a.precoSugerido:a.nome.localeCompare(b.nome));return `<div class="portfolio"><div class="portfolio-head"><div><div class="portfolio-title">Portfólio Solidum3D</div><div class="hint">Ranking por margem, lucro, lucro por hora e viabilidade</div></div><div class="sorts">${[['lucroHora','Lucro/hora'],['margem','Margem'],['lucro','Lucro/peça'],['preco','Preço'],['nome','Nome']].map(([k,l])=>`<button class="${sortBy===k?'active':''}" onclick="sortBy='${k}';render()">${l}</button>`).join('')}${historico.length?`<button class="csv" onclick="exportCSV()">↓ CSV</button>`:''}</div></div>${historico.length?sorted.map(h=>`<div class="prod" style="border-color:${h.viabilidadeCor||h.cor}55"><div><div class="prod-name">${h.nome}</div><div class="prod-sub">${h.marketplace} · ${h.data} · ${h.viabilidade}</div></div><div class="mono">R$ ${fmt(h.precoSugerido)}</div><div class="mono" style="color:var(--gold)">R$ ${fmt(h.precoPsico)}</div><div class="mono" style="color:${h.cor}">${pct(h.margemReal)}</div><div class="mono" style="color:${h.viabilidadeCor}">R$ ${fmt(h.lucroHora)}/h</div><div><button class="small load" onclick="v={...historico.find(x=>x.id===${h.id}).inputs};view='calc';tab='custos';render()">↩</button> <button class="small del" onclick="historico=historico.filter(x=>x.id!==${h.id});persist();render()">✕</button></div></div>`).join(''):`<div class="card" style="text-align:center;color:var(--muted);padding:60px">Nenhum produto salvo ainda.</div>`}</div>`}
function render(){resultado=calcular(v);document.getElementById('app').innerHTML=`<div class="header"><div class="brand"><div class="logo"></div><div><div class="brand-small">Solidum3D</div><div class="brand-title">Precificadora Estratégica</div></div></div><div class="nav"><button class="${view==='calc'?'active':''}" onclick="view='calc';render()">Calculadora</button><button class="${view==='portfolio'?'active':''}" onclick="view='portfolio';render()">Portfólio${historico.length?` (${historico.length})`:''}</button></div><div class="version"><div>Atlas Solidum</div><b>v7.3</b></div></div>${view==='calc'?renderCalc():renderPortfolio()}<div class="footer">SOLIDUM3D · ATLAS SOLIDUM · PRECIFICADORA ESTRATÉGICA v7.3</div>`}
load();render();if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}))}
</script>
