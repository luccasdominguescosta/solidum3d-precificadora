<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Precificadora Solidum3D</title>
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Precificadora" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{--bg:#0A0A0A;--gold:#D4AF37;--cream:#F5F0E8;--muted:#6B7280;--green:#00E5A0;--ok:#4ADE80;--yellow:#FACC15;--red:#F87171}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif} button,input{font:inherit}
    .header{background:linear-gradient(135deg,#111,#1A1500);border-bottom:1px solid rgba(212,175,55,.22);padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:2}.brand{display:flex;align-items:center;gap:10px}.logo{width:30px;height:30px;background:linear-gradient(135deg,#D4AF37,#8B6914);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)}.small{font-size:9px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase}.title{font-size:16px;font-weight:800}.nav{display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:10px;padding:3px;flex-wrap:wrap}.nav button,.tab button,.sorts button{border:0;border-radius:8px;background:transparent;color:var(--muted);padding:9px 12px;font-size:12px;font-weight:700}.nav button.active,.tab button.active,.sorts button.active{background:rgba(212,175,55,.15);color:var(--gold)}.version{font-size:10px;color:var(--muted);text-align:right}.version b{color:var(--gold)}
    .wrap{max-width:1140px;margin:0 auto;padding:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:28px}.panel,.card{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:18px}.field{margin-bottom:17px}.label{font-size:11px;color:#9CA3AF;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}.text,.num{width:100%;background:rgba(212,175,55,.07);border:1px solid rgba(212,175,55,.28);border-radius:10px;color:var(--cream);padding:11px 13px;outline:none}.rowhead{display:flex;justify-content:space-between;align-items:center;gap:10px}.numwrap{display:flex;align-items:center;gap:4px}.pre,.suf{color:var(--gold);font-family:ui-monospace,monospace;font-size:13px}.num{width:86px;text-align:right;font-family:ui-monospace,monospace;padding:5px 8px}input[type=range]{width:100%;accent-color:var(--gold)}.hint{font-size:11px;color:var(--muted);margin-top:3px}.tab{display:flex;gap:4px;margin:18px 0;background:rgba(255,255,255,.04);border-radius:10px;padding:3px}.tab button{flex:1}.mp{width:100%;display:flex;justify-content:space-between;margin:0 0 8px;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.03);color:#9CA3AF}.mp.active{border-color:var(--gold);background:rgba(212,175,55,.11);color:var(--gold)}
    .hero{background:linear-gradient(135deg,#111,#1A1500);border:1px solid rgba(0,229,160,.25);border-radius:16px;padding:22px;margin-bottom:14px}.eyebrow{font-size:10px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase}.price{font-size:42px;font-weight:900;line-height:1.05;margin:6px 0 12px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.metric{text-align:center}.metric .l{font-size:11px;color:var(--muted);margin-bottom:4px}.metric .v{font-size:20px;font-family:ui-monospace,monospace;font-weight:800}.save{width:100%;margin-top:16px;padding:11px;border-radius:10px;border:1px solid rgba(212,175,55,.45);background:rgba(212,175,55,.12);color:var(--gold);font-size:12px;font-weight:800}.decision{border-radius:14px;padding:15px;margin-bottom:12px}.line{display:flex;justify-content:space-between;gap:12px;margin:0 0 8px;font-size:12px}.line span:first-child{color:#9CA3AF}.line span:last-child{font-family:ui-monospace,monospace;text-align:right}.error{background:rgba(248,113,113,.09);border:1px solid rgba(248,113,113,.35);border-radius:16px;padding:20px;color:var(--red)}
    .portfolio-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:20px}.sorts{display:flex;gap:6px;flex-wrap:wrap}.csv{border:1px solid rgba(212,175,55,.45)!important;color:var(--gold)!important;background:rgba(212,175,55,.1)!important}.product{display:grid;grid-template-columns:2fr .85fr .85fr .85fr .95fr 1fr auto;gap:10px;align-items:center;background:rgba(255,255,255,.035);border-radius:14px;border:1px solid rgba(255,255,255,.08);padding:14px 16px;margin-bottom:8px}.prodname{font-size:13px;font-weight:800}.sub{font-size:10px;color:var(--muted)}.mono{font-family:ui-monospace,monospace;font-size:12px}.iconbtn{padding:6px 9px;border-radius:7px;background:transparent}.load{border:1px solid rgba(212,175,55,.35);color:var(--gold)}.del{border:1px solid rgba(248,113,113,.35);color:var(--red)}.empty{text-align:center;color:var(--muted);padding:60px 20px}.footer{text-align:center;padding:14px;color:#374151;font-size:10px;letter-spacing:.1em;border-top:1px solid rgba(255,255,255,.06)}
    @media(max-width:850px){.header{position:static;flex-direction:column;align-items:stretch}.version{text-align:left}.grid{grid-template-columns:1fr}.metrics{grid-template-columns:1fr}.portfolio-head{flex-direction:column}.product{grid-template-columns:1fr 1fr}.wrap{padding:14px}.price{font-size:36px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const STORAGE_KEY='solidum3d_historico_v6';
    const mpRates={shopee:{nome:'Shopee',taxa:16,fixa:2},mercadolivre:{nome:'Mercado Livre',taxa:17,fixa:6},proprio:{nome:'Loja Própria',taxa:3,fixa:1}};
    let v={nomeProduto:'',custoRolo:80,gramasPeca:100,embalagem:3,marketplace:'shopee',imposto:7,custoFixoMensal:4200,unidadesMes:150,custoAdsMensal:0,margemDesejada:55,precoAtual:0,horasImpressao:6,valorHoraMaquina:4,energiaPeca:.8,perdaProducao:8,comissaoFixa:2,vendasMesProduto:10};
    let view='calc', tab='custos', sortBy='lucroHora', historico=[];
    const $=id=>document.getElementById(id); const fmt=n=>Number(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); const pct=n=>`${Number(n||0).toFixed(1)}%`;
    function load(){try{historico=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{historico=[]}}
    function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(historico))}catch{}}
    function psico(valor){const bases=[29.9,34.9,39.9,44.9,49.9,54.9,59.9,64.9,69.9,74.9,79.9,84.9,89.9,99.9,109.9,119.9,129.9,149.9,169.9,199.9,249.9,299.9];return bases.find(p=>p>=valor)||Math.ceil(valor/10)*10-.1}
    function calc(){const mp=mpRates[v.marketplace]||mpRates.shopee,taxa=mp.taxa/100,imp=Number(v.imposto||0)/100,marg=Number(v.margemDesejada||0)/100,un=Math.max(Number(v.unidadesMes||1),1);const fixo=Number(v.custoFixoMensal||0)/un,ads=Number(v.custoAdsMensal||0)/un,filBr=(Number(v.custoRolo||0)/1000)*Number(v.gramasPeca||0),fil=filBr*(1+Number(v.perdaProducao||0)/100),emb=Number(v.embalagem||0),energia=Number(v.energiaPeca||0),horas=Number(v.horasImpressao||0),tempo=horas*Number(v.valorHoraMaquina||0),fixa=Number(v.comissaoFixa||0)||mp.fixa;const variavel=fil+emb+energia+tempo+fixa,total=variavel+fixo+ads,denMin=1-taxa-imp,den=1-taxa-imp-marg;const minimo=denMin>0?total/denMin:null,sug=den>0?total/den:null;if(!sug||!isFinite(sug))return{erro:'Combinação inviável: reduza margem, taxa ou custos.',custoTotal:total,precoMinimo:minimo};const taxaV=sug*taxa,impV=sug*imp,lucro=sug-total-taxaV-impV,margem=(lucro/sug)*100,lucroHora=horas>0?lucro/horas:0,cap=horas>0?Math.floor((24*26)/horas):0,lucroMes=lucro*Number(v.vendasMesProduto||0);let viab='Revisar',vc='#FACC15',msg='Produto exige atenção antes de escalar.';if(margem>=40&&lucro>=15&&lucroHora>=3){viab='Vale escalar';vc='#00E5A0';msg='Produto forte para ocupar máquina e receber tráfego.'}else if(margem>=30&&lucro>=10&&lucroHora>=2){viab='Vale manter';vc='#4ADE80';msg='Produto saudável, mas ainda não é prioridade máxima.'}else if(margem>=20){viab='Teste controlado';vc='#FACC15';msg='Pode vender, mas não deve ocupar muita capacidade.'}else{viab='Não priorizar';vc='#F87171';msg='Margem baixa para a operação da Solidum3D.'}let clas='Crítico',cor='#F87171',emoji='🚨';if(margem>=50&&lucroHora>=3){clas='Campeão';cor='#00E5A0';emoji='🏆'}else if(margem>=35){clas='Saudável';cor='#4ADE80';emoji='✅'}else if(margem>=20){clas='Experimento';cor='#FACC15';emoji='⚠️'}let diag=null,pa=Number(v.precoAtual||0);if(pa>0){const la=pa-total-pa*taxa-pa*imp,ma=(la/pa)*100,lha=horas>0?la/horas:0;let st='Saudável',sc='#00E5A0',sm=`Produto saudável: R$ ${fmt(lha)} por hora de máquina.`;if(minimo&&pa<minimo){st='Prejuízo';sc='#F87171';sm=`Você perde R$ ${fmt(Math.abs(la))} por peça.`}else if(lha<2){st='Baixo rendimento';sc='#FACC15';sm=`Lucro/hora de apenas R$ ${fmt(lha)}.`}else if(ma<35){st='Abaixo do ideal';sc='#FACC15';sm=`Margem real de ${pct(ma)}.`}diag={lucroAtual:la,margemAtual:ma,lucroHoraAtual:lha,diff:pa-sug,status:st,statusCor:sc,statusMsg:sm,pa}}
      return{precoMinimo:minimo,precoSugerido:sug,precoPsico:psico(sug),custoTotal:total,custoFixoUnit:fixo,custoAdsUnit:ads,custoVariavel:variavel,custoFilamento:fil,custoFilamentoBruto:filBr,embalagem:emb,energiaPeca:energia,custoTempoMaquina:tempo,comissaoFixa:fixa,taxaValor:taxaV,impostoValor:impV,lucroLiquido:lucro,margemReal:margem,lucroHora,capacidadeMensalPorMaquina:cap,capacidadeMensal5Maquinas:cap*5,lucroMensalEstimado:lucroMes,classificacao:clas,cor,emoji,viabilidade:viab,viabilidadeCor:vc,viabilidadeMsg:msg,diagnosticoAtual:diag}}
    function slider(label,key,min,max,step,prefix='',suffix='',hint=''){return `<div class="field"><div class="rowhead"><div class="label">${label}</div><div class="numwrap"><span class="pre">${prefix}</span><input class="num" type="number" value="${v[key]}" min="${min}" max="${max}" step="${step}" onchange="setv('${key}',this.value)"><span class="suf">${suffix}</span></div></div><input type="range" value="${v[key]}" min="${min}" max="${max}" step="${step}" oninput="setv('${key}',this.value)">${hint?`<div class="hint">${hint}</div>`:''}</div>`}
    function metric(l,val,cor='#F5F0E8'){return `<div class="metric"><div class="l">${l}</div><div class="v" style="color:${cor}">${val}</div></div>`}
    function nav(){return `<div class="nav"><button class="${view==='calc'?'active':''}" onclick="view='calc';render()">Calculadora</button><button class="${view==='portfolio'?'active':''}" onclick="view='portfolio';render()">Portfólio ${historico.length?`<span class="badge">${historico.length}</span>`:''}</button></div>`}
    function header(){return `<div class="header"><div class="brand"><div class="logo"></div><div><div class="small">Solidum3D</div><div class="title">Precificadora Estratégica</div></div></div>${nav()}<div class="version"><div>Atlas Solidum</div><b>v6.0</b></div></div>`}
    function renderCalc(){const r=calc();let left=`<div class="field"><div class="label">Nome do Produto</div><input class="text" value="${v.nomeProduto}" placeholder="Ex: SolidCristo, SolidPray..." oninput="setText('nomeProduto',this.value)"></div><div class="tab">${['custos','producao','estrutura','canal'].map(t=>`<button class="${tab===t?'active':''}" onclick="tab='${t}';render()">${{custos:'Custos',producao:'Produção',estrutura:'Estrutura',canal:'Canal'}[t]}</button>`).join('')}</div><div class="panel">`;
      if(tab==='custos')left+=slider('Custo do rolo','custoRolo',20,300,1,'R$','','Valor do rolo de 1kg')+slider('Consumo por peça','gramasPeca',1,1000,1,'','g')+slider('Embalagem e insumos','embalagem',0,30,.5,'R$')+slider('Margem desejada','margemDesejada',10,80,1,'','%')+slider('Preço atual praticado','precoAtual',0,500,.5,'R$');
      if(tab==='producao')left+=slider('Tempo de impressão','horasImpressao',.5,24,.5,'','h','Tempo médio que a peça ocupa uma impressora')+slider('Valor da hora de máquina','valorHoraMaquina',0,20,.5,'R$','','Custo estratégico por hora de impressora ocupada')+slider('Energia por peça','energiaPeca',0,10,.1,'R$')+slider('Perda / refugo','perdaProducao',0,30,1,'','%','Falhas, suporte, testes, retrabalho e perdas')+slider('Vendas mensais do produto','vendasMesProduto',0,500,1,'',' un');
      if(tab==='estrutura')left+=slider('Custo fixo mensal total','custoFixoMensal',0,20000,100,'R$')+slider('Investimento em Ads/mês','custoAdsMensal',0,10000,50,'R$')+slider('Unidades vendidas/mês','unidadesMes',10,2000,5,'',' un')+slider('Imposto','imposto',4,15,.5,'','%');
      if(tab==='canal'){left+=`<div class="label">Marketplace</div>`+Object.entries(mpRates).map(([k,m])=>`<button class="mp ${v.marketplace===k?'active':''}" onclick="setMarket('${k}')"><span>${m.nome}</span><span>−${m.taxa}% + R$ ${fmt(m.fixa)}</span></button>`).join('')+slider('Comissão fixa por venda','comissaoFixa',0,30,.5,'R$','','Tarifa fixa, cupom, frete subsidiado ou custo adicional')}
      left+='</div>'; if(r.erro)return `<div class="grid"><div>${left}</div><div><div class="error">${r.erro}</div></div></div>`;
      let right=''; if(r.diagnosticoAtual)right+=`<div class="decision" style="background:${r.diagnosticoAtual.statusCor}12;border:1px solid ${r.diagnosticoAtual.statusCor}55"><div class="small" style="color:${r.diagnosticoAtual.statusCor}">Diagnóstico do Preço Atual</div><div class="metrics">${metric('Margem atual',pct(r.diagnosticoAtual.margemAtual),r.diagnosticoAtual.statusCor)}${metric('Lucro atual',`R$ ${fmt(r.diagnosticoAtual.lucroAtual)}`,r.diagnosticoAtual.statusCor)}${metric('Lucro/hora atual',`R$ ${fmt(r.diagnosticoAtual.lucroHoraAtual)}`,r.diagnosticoAtual.statusCor)}</div><div class="hint">${r.diagnosticoAtual.statusMsg}</div></div>`;
      right+=`<div class="hero" style="border-color:${r.cor}55"><div class="eyebrow">Preço Sugerido</div><div class="price">R$ ${fmt(r.precoSugerido)}</div><div class="metrics">${metric('Preço psicológico',`R$ ${fmt(r.precoPsico)}`,'#D4AF37')}${metric('Lucro/peça',`R$ ${fmt(r.lucroLiquido)}`,r.cor)}${metric('Margem',pct(r.margemReal),r.cor)}</div><button class="save" onclick="salvar()">＋ Salvar no Portfólio</button></div><div class="decision" style="background:${r.viabilidadeCor}12;border:1px solid ${r.viabilidadeCor}55"><div class="small" style="color:${r.viabilidadeCor}">Decisão Estratégica</div><div style="font-size:18px;font-weight:900;color:${r.viabilidadeCor}">${r.viabilidade}</div><div class="hint">${r.viabilidadeMsg}</div></div><div class="metrics" style="margin-bottom:12px">${metric('Lucro / hora',`R$ ${fmt(r.lucroHora)}`,r.viabilidadeCor)}${metric('Lucro mensal',`R$ ${fmt(r.lucroMensalEstimado)}`,'#00E5A0')}${metric('Preço mínimo',`R$ ${fmt(r.precoMinimo)}`,'#F87171')}</div><div class="card"><div class="label">Capacidade Produtiva</div><div class="line"><span>Capacidade mensal por máquina</span><span>${r.capacidadeMensalPorMaquina} peças</span></div><div class="line"><span>Capacidade mensal com 5 máquinas</span><span style="color:#D4AF37">${r.capacidadeMensal5Maquinas} peças</span></div></div><br><div class="card"><div class="label">Decomposição do Preço</div>${[['Filamento com refugo',r.custoFilamento],['Embalagem',r.embalagem],['Energia',r.energiaPeca],['Hora de máquina',r.custoTempoMaquina],['Comissão fixa',r.comissaoFixa],['Custo fixo rateado',r.custoFixoUnit],['Ads rateado',r.custoAdsUnit],['Taxa marketplace',r.taxaValor],['Imposto',r.impostoValor],['Lucro líquido',r.lucroLiquido]].map(x=>`<div class="line"><span>${x[0]}</span><span>R$ ${fmt(x[1])}</span></div>`).join('')}</div>`;
      return `<div class="grid"><div>${left}</div><div>${right}</div></div>`}
    function renderPortfolio(){let arr=[...historico].sort((a,b)=>sortBy==='margem'?b.margemReal-a.margemReal:sortBy==='lucro'?b.lucroLiquido-a.lucroLiquido:sortBy==='preco'?b.precoSugerido-a.precoSugerido:sortBy==='nome'?a.nome.localeCompare(b.nome):(b.lucroHora||0)-(a.lucroHora||0));return `<div><div class="portfolio-head"><div><div class="title" style="font-size:22px">Portfólio Solidum3D</div><div class="hint">Ranking por margem, lucro e lucro por hora</div></div><div class="sorts">${[['lucroHora','Lucro/hora'],['margem','Margem'],['lucro','Lucro/peça'],['preco','Preço'],['nome','Nome']].map(s=>`<button class="${sortBy===s[0]?'active':''}" onclick="sortBy='${s[0]}';render()">${s[1]}</button>`).join('')}${historico.length?'<button class="csv" onclick="csv()">↓ CSV</button>':''}</div></div>${!historico.length?'<div class="empty">Nenhum produto salvo ainda.</div>':arr.map(h=>`<div class="product" style="border-color:${h.viabilidadeCor||h.cor}55"><div><div class="prodname">${h.nome}</div><div class="sub">${h.marketplace} · ${h.data} · ${h.viabilidade||''}</div></div><div class="mono">R$ ${fmt(h.precoSugerido)}</div><div class="mono" style="color:#D4AF37">R$ ${fmt(h.precoPsico)}</div><div class="mono" style="color:${h.cor}">${pct(h.margemReal)}</div><div class="mono" style="color:${h.cor}">R$ ${fmt(h.lucroLiquido)}</div><div class="mono" style="color:${h.viabilidadeCor}">R$ ${fmt(h.lucroHora)}/h</div><div><button class="iconbtn load" onclick="carregar(${h.id})">↩</button> <button class="iconbtn del" onclick="excluir(${h.id})">✕</button></div></div>`).join('')}</div>`}
    function render(){document.getElementById('app').innerHTML=header()+`<main class="wrap">${view==='calc'?renderCalc():renderPortfolio()}</main>`+`<div class="footer">SOLIDUM3D · ATLAS SOLIDUM · PRECIFICADORA ESTRATÉGICA v6.0</div>`}
    window.setv=(k,val)=>{v[k]=parseFloat(val)||0;render()}; window.setText=(k,val)=>{v[k]=val}; window.setMarket=k=>{v.marketplace=k;v.comissaoFixa=mpRates[k].fixa;render()};
    window.salvar=()=>{const r=calc(); if(r.erro)return; const e={id:Date.now(),data:new Date().toLocaleDateString('pt-BR'),nome:v.nomeProduto||'Produto sem nome',marketplace:mpRates[v.marketplace]?.nome||'Shopee',precoSugerido:r.precoSugerido,precoPsico:r.precoPsico,precoMinimo:r.precoMinimo,precoAtual:Number(v.precoAtual||0),lucroLiquido:r.lucroLiquido,lucroHora:r.lucroHora,margemReal:r.margemReal,margemAtual:r.diagnosticoAtual?.margemAtual??null,lucroAtual:r.diagnosticoAtual?.lucroAtual??null,viabilidade:r.viabilidade,viabilidadeCor:r.viabilidadeCor,classificacao:r.classificacao,cor:r.cor,emoji:r.emoji,custoTotal:r.custoTotal,capacidadeMensalPorMaquina:r.capacidadeMensalPorMaquina,capacidadeMensal5Maquinas:r.capacidadeMensal5Maquinas,lucroMensalEstimado:r.lucroMensalEstimado,inputs:{...v}}; historico=[e,...historico.filter(h=>h.nome!==e.nome||h.inputs?.marketplace!==e.inputs.marketplace)]; save(); view='portfolio'; render()};
    window.excluir=id=>{historico=historico.filter(h=>h.id!==id);save();render()}; window.carregar=id=>{const h=historico.find(x=>x.id===id);if(h){v={...h.inputs};view='calc';tab='custos';render()}};
    window.csv=()=>{const header=['Data','Produto','Marketplace','Preço Atual','Margem Atual %','Preço Sugerido','Preço Psicológico','Preço Mínimo','Lucro/Peça','Lucro/Hora','Margem Ideal %','Viabilidade','Capacidade 1 Máquina','Capacidade 5 Máquinas','Lucro Mensal Estimado','Classificação'];const rows=historico.map(h=>[h.data,h.nome,h.marketplace,h.precoAtual>0?h.precoAtual.toFixed(2):'-',h.margemAtual!=null?h.margemAtual.toFixed(1):'-',h.precoSugerido.toFixed(2),h.precoPsico?.toFixed(2)||'-',h.precoMinimo?.toFixed(2)||'-',h.lucroLiquido.toFixed(2),h.lucroHora?.toFixed(2)||'-',h.margemReal.toFixed(1),h.viabilidade||'-',h.capacidadeMensalPorMaquina||'-',h.capacidadeMensal5Maquinas||'-',h.lucroMensalEstimado?.toFixed(2)||'-',h.classificacao]);const csv=[header,...rows].map(r=>r.join(';')).join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='solidum3d_precificadora_v6.csv';a.click();URL.revokeObjectURL(url)};
    load(); render(); if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}))}
  </script>
